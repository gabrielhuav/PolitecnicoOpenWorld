name: PR Quality Gate

# Gate de CALIDAD que corre en cada PR ABIERTO/actualizado hacia main (ANTES del merge):
#   1) tests unitarios (testDebugUnitTest)  -> GATE DURO (bloquea)
#   2) analisis estatico con detekt          -> ADVISORY por ahora (reporta, no bloquea)
# NO toca ni depende del workflow de deploy (`android-release.yml`), que corre al CERRAR/MERGEAR el PR.
# Por eso este usa types: [opened, synchronize, reopened] (PR vivo) y aquel usa types: [closed].

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'PolitecnicoOpenWorld/**'

# Cancela ejecuciones viejas del mismo PR cuando se hace push de nuevos commits.
concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1) Tests unitarios de logica pura (GATE DURO: si fallan, el PR no debe mergear) ──────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Create secrets.properties (Maps API key; vacio es valido para tests)
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > PolitecnicoOpenWorld/secrets.properties
      # NOTA: no se escribe google-services.json a proposito -> el plugin google-services NO se aplica
      # (ver app/build.gradle.kts) y el proyecto compila/testea sin Firebase. Es lo que queremos en el gate.
      - name: Run unit tests
        working-directory: ./PolitecnicoOpenWorld
        run: gradle :app:testDebugUnitTest --stacktrace
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: PolitecnicoOpenWorld/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

  # ── 2) Analisis estatico con detekt (ADVISORY) ───────────────────────────────────────────────
  # continue-on-error: true => el job REPORTA issues pero NO bloquea el merge. Es la fase de
  # ADOPCION: el codigo existente arrastra deuda de estilo (ver README for IAS / ANALISIS §9 y el
  # CHANGELOG_NOCHE). Para volverlo BLOQUEANTE cuando se quiera:
  #   1) genera un baseline UNA vez (perdona los issues actuales, exige el estandar SOLO al codigo nuevo):
  #        ./detekt-cli-1.23.8/bin/detekt-cli --create-baseline \
  #          --baseline PolitecnicoOpenWorld/config/detekt/baseline.xml \
  #          --config PolitecnicoOpenWorld/config/detekt/detekt.yml \
  #          --build-upon-default-config --input PolitecnicoOpenWorld/app/src/main/java
  #      commitea baseline.xml (el step de abajo ya lo usa si existe), y
  #   2) quita `continue-on-error: true` de este job.
  # Se usa la CLI (no el plugin Gradle) para NO tocar el build de la app (imposible romper assemble/bundle).
  detekt:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DETEKT_VERSION: "1.23.8"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Download detekt CLI
        run: |
          curl -sSL -o detekt-cli.zip \
            "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}.zip"
          unzip -q detekt-cli.zip
      - name: Run detekt (advisory)
        run: |
          BASELINE_ARG=""
          if [ -f PolitecnicoOpenWorld/config/detekt/baseline.xml ]; then
            BASELINE_ARG="--baseline PolitecnicoOpenWorld/config/detekt/baseline.xml"
          fi
          "./detekt-cli-${DETEKT_VERSION}/bin/detekt-cli" \
            --config PolitecnicoOpenWorld/config/detekt/detekt.yml \
            --build-upon-default-config \
            --input PolitecnicoOpenWorld/app/src/main/java \
            $BASELINE_ARG \
            --report sarif:detekt-results.sarif
      - name: Upload detekt SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-sarif
          path: detekt-results.sarif
          if-no-files-found: ignore
