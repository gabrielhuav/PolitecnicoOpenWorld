name: Generate Release Asset on PR Merge

on:
   pull_request:
      branches:
         - main
      types:
         - closed

jobs:
   release:
      # Si el PR fue cerrado y aprobado (merged)
      if: github.event.pull_request.merged == true
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up JDK 17
           uses: actions/setup-java@v4
           with:
              java-version: "17"
              distribution: "temurin"
              cache: "gradle"

         # 1. Reconstruir el archivo secrets.properties dentro de la carpeta de Android antes de compilar
         - name: Create secrets.properties file
           run: |
              echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> PolitecnicoOpenWorld/secrets.properties

         # 2. Conceder permisos de ejecución al wrapper de Gradle
         - name: Grant execute permission for gradlew
           run: chmod +x PolitecnicoOpenWorld/gradlew

         # 3. Compilar el APK (Formato instalable directo)
         - name: Build APK
           working-directory: ./PolitecnicoOpenWorld
           run: ./gradlew assembleRelease

         # 4. Compilar el AAB (Formato Bundle para tiendas)
         - name: Build Android App Bundle (AAB)
           working-directory: ./PolitecnicoOpenWorld
           run: ./gradlew bundleRelease

         # 5. Publicar automáticamente en los Releases del repositorio de GitHub
         - name: Create GitHub Release
           uses: softprops/action-gh-release@v2
           with:
              # Asigna un tag único basado en el número de Pull Request
              tag_name: v1.0.${{ github.event.pull_request.number }}
              name: Release desde PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
              body: |
                 Compilación automática generada con éxito.

                 **Detalles del cambio:**
                 - **Autor:** @${{ github.event.pull_request.user.login }}
                 - **Pull Request:** #${{ github.event.pull_request.number }}
                 - **Título:** ${{ github.event.pull_request.title }}
              draft: false
              prerelease: false
              files: |
                 PolitecnicoOpenWorld/app/build/outputs/apk/release/app-release-unsigned.apk
                 PolitecnicoOpenWorld/app/build/outputs/bundle/release/app-release.aab
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
