name: Generate Release Asset on PR Merge

on:
   pull_request:
      branches:
         - main
      types:
         - closed

jobs:
   release:
      # Si el PR fue cerrado y aprobado (merged)
      if: github.event.pull_request.merged == true
      runs-on: ubuntu-latest
      permissions:
         contents: write

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up JDK 21
           uses: actions/setup-java@v4
           with:
              java-version: "21"
              distribution: "jetbrains"

         - name: Setup Gradle
           uses: gradle/actions/setup-gradle@v4
           with:
              gradle-version: "9.4.1"

         # 1. Reconstruir el archivo secrets.properties dentro de la carpeta de Android antes de compilar
         - name: Create secrets.properties file
           run: |
              echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > PolitecnicoOpenWorld/secrets.properties

         # 2. Compilar el APK (Formato instalable directo)
         - name: Build APK
           working-directory: ./PolitecnicoOpenWorld
           run: gradle assembleRelease

         # 3. Compilar el AAB (Desactivado temporalmente - solo se requiere APK para distribución directa)
         # - name: Build Android App Bundle (AAB)
         #   working-directory: ./PolitecnicoOpenWorld
         #   run: gradle bundleRelease

         # 4. Firmar el APK con una llave de prueba (test-only) para poder instalarlo
         - name: Sign APK
           working-directory: ./PolitecnicoOpenWorld
           run: |
              keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
              APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
              $APKSIGNER sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app/build/outputs/apk/release/app-release-unsigned.apk
              mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-testonly.apk

         # 5. Publicar automáticamente en los Releases del repositorio de GitHub
         - name: Create GitHub Release
           uses: softprops/action-gh-release@v2
           with:
               # Asigna un tag único basado en el run_number y el SHA del commit
               tag_name: v1.0.${{ github.run_number }}-${{ github.sha }}
               name: Release desde PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
               body: |
                  Compilación automática generada con éxito.

                  **Detalles del cambio:**
                  - **Autor:** @${{ github.event.pull_request.user.login }}
                  - **Pull Request:** #${{ github.event.pull_request.number }}
                  - **Título:** ${{ github.event.pull_request.title }}
                  - **Commit:** ${{ github.sha }}
                  - **Nota:** El APK ha sido firmado con una llave de prueba para poder instalarse.
               draft: false
               prerelease: false
               make_latest: true
               files: |
                  PolitecnicoOpenWorld/app/build/outputs/apk/release/app-release-testonly.apk
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
