name: Generate Release Asset on PR Merge

on:
   pull_request:
      branches:
         - main
      types:
         - closed

jobs:
   release:
      # Si el PR fue cerrado y aprobado (merged)
      if: github.event.pull_request.merged == true
      runs-on: ubuntu-latest
      permissions:
         contents: write

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up JDK 21
           uses: actions/setup-java@v4
           with:
              java-version: "21"
              distribution: "temurin"

         - name: Setup Gradle
           uses: gradle/actions/setup-gradle@v4
           with:
              gradle-version: "9.4.1"

         # 1. Reconstruir el archivo secrets.properties dentro de la carpeta de Android antes de compilar
         - name: Create secrets.properties file
           run: |
              echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > PolitecnicoOpenWorld/secrets.properties

         # 2. Compilar el APK (Debug)
         - name: Build APK
           working-directory: ./PolitecnicoOpenWorld
           run: gradle assembleDebug

         # 3. Compilar el AAB (Desactivado temporalmente - solo se requiere APK para distribución directa)
         # - name: Build Android App Bundle (AAB)
         #   working-directory: ./PolitecnicoOpenWorld
         #   run: gradle bundleRelease


         # 4. Publicar automáticamente en los Releases del repositorio de GitHub
         - name: Create GitHub Release
           uses: softprops/action-gh-release@v2
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              PR_TITLE: ${{ github.event.pull_request.title }}
              PR_AUTHOR: ${{ github.event.pull_request.user.login }}
           with:
               # Asigna un tag único basado en el run_number para mantener un listado limpio
               tag_name: v1.0.${{ github.run_number }}
               name: "Release desde PR #${{ github.event.pull_request.number }} - ${{ env.PR_TITLE }}"
               body: |
                  Compilación automática generada con éxito.

                  **Detalles del cambio:**
                  - **Autor:** @${{ env.PR_AUTHOR }}
                  - **Pull Request:** #${{ github.event.pull_request.number }}
                  - **Título:** ${{ env.PR_TITLE }}
                  - **Commit:** ${{ github.sha }}
                  - **Nota Importante:** El APK es una versión **Debug** lista para instalarse de forma directa. No requiere llaves adicionales para pruebas.
               draft: false
               prerelease: true
               make_latest: true
               files: |
                  PolitecnicoOpenWorld/app/build/outputs/apk/debug/app-debug.apk
